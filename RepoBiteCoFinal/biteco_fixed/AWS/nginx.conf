# nginx.conf — Optimizado para ASR de Escalabilidad (12000 usuarios pico)
# Colocar en Seguridad/nginx.conf

worker_processes auto;  # Un proceso por CPU core
worker_rlimit_nofile 65536;

events {
    worker_connections 4096;    # 4096 × N_workers = conexiones totales
    use epoll;                  # I/O más eficiente en Linux
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging mínimo para no saturar disco en pruebas de carga
    access_log off;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Timeouts ajustados al ASR
    keepalive_timeout  65;
    keepalive_requests 1000;
    client_body_timeout   30s;
    client_header_timeout 30s;
    send_timeout          30s;

    # Buffer de requests (permite absorber el pico de 12000)
    client_body_buffer_size    128k;
    client_max_body_size       10m;
    large_client_header_buffers 4 32k;

    # Upstream: Django/Gunicorn
    upstream django_backend {
        server web:8000;
        keepalive 100;   # Conexiones keep-alive al backend
    }

    server {
        listen 80;
        server_name _;

        # Health check directo de Nginx (para el ALB de AWS)
        location /health/ {
            proxy_pass         http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            access_log off;
        }

        # API endpoints
        location / {
            proxy_pass         http://django_backend;
            proxy_http_version 1.1;

            # Headers para el middleware de control de acceso
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Timeouts del proxy
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;

            # Buffers
            proxy_buffer_size          4k;
            proxy_buffers              8 4k;
            proxy_busy_buffers_size    8k;
        }

        # Archivos estáticos directamente desde Nginx
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
